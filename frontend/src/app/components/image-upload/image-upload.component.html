<ion-card class="upload-card">
  <ion-card-content>
    <div 
      class="drop-zone" 
      (click)="fileInput.click()"
      (dragover)="onDragOver($event)"
      (dragleave)="onDragLeave($event)"
      (drop)="onDrop($event)"
      [class.drag-over]="isDragging">
      
      <div class="upload-content">
        <ion-icon name="images-outline" color="primary"></ion-icon>
        <h3>Upload Multiple Images</h3>
        <p>Drag files here or <span>click to browse</span></p>
      </div>

      <input 
        #fileInput 
        type="file" 
        (change)="onFileSelected($event)" 
        accept="image/png, image/jpeg, image/jpg" 
        multiple 
        hidden />
    </div>

    <div class="list-header" *ngIf="previews.length > 0">
      <ion-label>Selected ({{ previews.length }})</ion-label>
      <ion-button fill="clear" color="danger" size="small" (click)="clearAll()">
        Clear All
      </ion-button>
    </div>

    <ion-list lines="full">
      <ion-item *ngFor="let img of previews; let i = index" class="preview-item">
        <ion-thumbnail slot="start">
          <img [src]="img.url" />
        </ion-thumbnail>
        <ion-label>
          <h2 class="ion-text-nowrap">{{ img.name }}</h2>
          <p>{{ (img.size / 1024).toFixed(1) }} KB</p>
        </ion-label>
        <ion-button fill="clear" color="medium" (click)="removeImage(i)">
          <ion-icon name="trash-outline" slot="icon-only"></ion-icon>
        </ion-button>
      </ion-item>
    </ion-list>
  </ion-card-content>
</ion-card>
<ion-button 
  expand="block" 
  color="success" 
  [disabled]="selectedFiles.length === 0"
  (click)="uploadImages()">
  <ion-icon name="cloud-upload-outline" slot="start"></ion-icon>
  Upload to Server
</ion-button>
