<div class="carousel-container">
  <swiper-container 
    [navigation]="true" 
    [pagination]="true" 
    [loop]="true"
    class="main-swiper">
    
    <swiper-slide *ngFor="let img of images">
      <div class="image-box">
        <img [src]="img.url" />
      </div>
    </swiper-slide>
  </swiper-container>
  <img class="star-deco-1" src="assets/4-point-star-outline.svg">
</div>
